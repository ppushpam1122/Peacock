<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="600" height="750">
  <rect width="600" height="750" fill="#f8f8f6"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1a1a1a" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="600" height="750" fill="url(#grid)"/>
  <!-- Center garment silhouette -->
  <g opacity="0.15" fill="#1a1a1a">
    <!-- T-shirt / shirt body -->
    <rect x="185" y="260" width="230" height="260" rx="4"/>
    <!-- Collar -->
    <path d="M 275 260 Q 300 300 325 260 L 340 230 Q 300 250 260 230 Z"/>
    <!-- Sleeves -->
    <path d="M 185 260 L 130 310 L 150 340 L 185 290 Z"/>
    <path d="M 415 260 L 470 310 L 450 340 L 415 290 Z"/>
  </g>
  <!-- Brand watermark -->
  <text x="300" y="400" font-family="Georgia, serif" font-size="120" font-weight="bold"
        fill="#1a1a1a" opacity="0.06" text-anchor="middle" dominant-baseline="middle">D</text>
  <!-- Product name -->
  <text x="300" y="640" font-family="Georgia, serif" font-size="28" font-weight="500"
        fill="#1a1a1a" opacity="0.9" text-anchor="middle">Poplin</text>
  <text x="300" y="678" font-family="Georgia, serif" font-size="22" font-weight="400"
        fill="#1a1a1a" opacity="0.7" text-anchor="middle">Slim-Fit</text>
  <!-- Product ID -->
  <text x="300" y="720" font-family="monospace" font-size="13"
        fill="#1a1a1a" opacity="0.4" text-anchor="middle">SHIRT-003</text>
  <!-- Corner decoration -->
  <rect x="20" y="20" width="50" height="2" fill="#1a1a1a" opacity="0.3"/>
  <rect x="20" y="20" width="2" height="50" fill="#1a1a1a" opacity="0.3"/>
  <rect x="530" y="20" width="50" height="2" fill="#1a1a1a" opacity="0.3"/>
  <rect x="578" y="20" width="2" height="50" fill="#1a1a1a" opacity="0.3"/>
  <rect x="20" y="728" width="50" height="2" fill="#1a1a1a" opacity="0.3"/>
  <rect x="20" y="680" width="2" height="50" fill="#1a1a1a" opacity="0.3"/>
  <rect x="530" y="728" width="50" height="2" fill="#1a1a1a" opacity="0.3"/>
  <rect x="578" y="680" width="2" height="50" fill="#1a1a1a" opacity="0.3"/>
</svg>